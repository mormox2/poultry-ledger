
<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  /* DARK THEME (Default) */
  --bg: #0a0f1d;
  --bg2: #111827;
  --bg3: #1f2937;
  --border: #374151;
  --gold: #d4a843;
  --gold-rgb: 212, 168, 67;
  --gold2: #f59e0b;
  --blue: #3b82f6;
  --green: #10b981;
  --red: #ef4444;
  --orange: #f97316;
  --text: #f3f4f6;
  --muted: #9ca3af;
  --radius: 12px;
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  --card-bg: var(--bg2);
  --glass-bg: rgba(17, 24, 39, 0.75);
  --glass-border: rgba(55, 65, 81, 0.5);
}

body.light-theme {
  /* LIGHT THEME */
  --bg: #f3f4f6;
  --bg2: #ffffff;
  --bg3: #f9fafb;
  --border: #e5e7eb;
  --gold: #b45309;
  --gold-rgb: 180, 83, 9;
  --gold2: #d97706;
  --blue: #2563eb;
  --green: #059669;
  --red: #dc2626;
  --orange: #ea580c;
  --text: #111827;
  --muted: #6b7280;
  --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
  --card-bg: var(--bg2);
  --glass-bg: rgba(255, 255, 255, 0.8);
  --glass-border: rgba(229, 231, 235, 0.8);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--bg); 
  color: var(--text); 
  font-family: 'IBM Plex Sans Arabic', sans-serif; 
  min-height: 100vh; 
  overflow-x: hidden; 
  transition: background 0.3s ease, color 0.3s ease;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold); }

/* TOAST */
#toast { 
  position: fixed; 
  top: 24px; 
  left: 50%; 
  transform: translateX(-50%) translateY(-120px); 
  padding: 14px 24px; 
  border-radius: 12px; 
  font-size: 14px; 
  font-weight: 700; 
  transition: transform .4s cubic-bezier(.175,.885,.32,1.275), opacity 0.3s ease; 
  z-index: 10000; 
  pointer-events: none; 
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0;
  backdrop-filter: blur(12px);
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
#toast.success { background: rgba(16, 185, 129, 0.95); border: 1px solid var(--green); color: white; }
#toast.error { background: rgba(239, 68, 68, 0.95); border: 1px solid var(--red); color: white; }
#toast.warning { background: rgba(249, 115, 22, 0.95); border: 1px solid var(--orange); color: white; }
#toast.info { background: rgba(59, 130, 246, 0.95); border: 1px solid var(--blue); color: white; }

/* CHART TOOLTIP */
#chart-tooltip {
  position: absolute;
  display: none;
  background: rgba(17, 24, 39, 0.92);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 12px;
  color: var(--text);
  box-shadow: var(--shadow);
  pointer-events: none;
  z-index: 9999;
  transition: opacity 0.15s ease, transform 0.15s ease;
  min-width: 150px;
  direction: rtl;
}

/* HEADER */
header { 
  background: var(--glass-bg); 
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--glass-border); 
  position: sticky; 
  top: 0; 
  z-index: 100; 
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}
.header-inner { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 70px; gap: 12px; }
.logo { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.logo-icon { 
  width: 44px; 
  height: 44px; 
  background: linear-gradient(135deg, var(--gold), var(--gold2)); 
  border-radius: 10px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 22px; 
  box-shadow: 0 0 15px rgba(var(--gold-rgb),.3); 
}
.logo-text { font-weight: 800; font-size: 16px; color: var(--gold); line-height: 1.2; }
.logo-sub { font-size: 11px; color: var(--muted); font-weight: 400; }

nav { display: flex; gap: 6px; }
nav button { 
  padding: 8px 16px; 
  border-radius: 8px; 
  border: none; 
  cursor: pointer; 
  font-family: inherit; 
  font-size: 13px; 
  font-weight: 600; 
  transition: all .25s ease; 
  white-space: nowrap; 
  display: flex;
  align-items: center;
  gap: 6px;
}
nav button.active { background: var(--gold); color: #0a0f1d; box-shadow: 0 4px 12px rgba(var(--gold-rgb), 0.35); }
nav button:not(.active) { background: transparent; color: var(--muted); border: 1px solid var(--border); }
nav button:not(.active):hover { border-color: var(--gold); color: var(--gold); background: rgba(var(--gold-rgb), 0.05); }

/* THEME TOGGLE BUTTON */
.theme-toggle {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--gold);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s ease;
}
.theme-toggle:hover {
  border-color: var(--gold);
  background: rgba(var(--gold-rgb), 0.08);
  transform: scale(1.05);
}

/* MAIN */
main { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

/* CARDS */
.card { 
  background: var(--card-bg); 
  border: 1px solid var(--border); 
  border-radius: var(--radius); 
  padding: 20px; 
  box-shadow: var(--shadow);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.card:hover {
  border-color: rgba(var(--gold-rgb), 0.3);
}
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

/* STAT CARDS */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat { 
  background: var(--card-bg); 
  border: 1px solid var(--border); 
  border-radius: var(--radius); 
  padding: 16px 20px; 
  position: relative; 
  overflow: hidden; 
  box-shadow: var(--shadow);
  transition: transform .25s ease, border-color 0.25s ease; 
}
.stat:hover { transform: translateY(-4px); border-color: rgba(var(--gold-rgb), 0.4); }
.stat::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; border-radius: var(--radius) var(--radius) 0 0; }
.stat.gold::before { background: var(--gold); }
.stat.blue::before { background: var(--blue); }
.stat.green::before { background: var(--green); }
.stat.red::before { background: var(--red); }
.stat-label { font-size: 12px; color: var(--muted); font-weight: 500; margin-bottom: 8px; }
.stat-value { font-size: 24px; font-weight: 800; font-family: 'Plus Jakarta Sans', sans-serif; }
.stat.gold .stat-value { color: var(--gold); }
.stat.blue .stat-value { color: var(--blue); }
.stat.green .stat-value { color: var(--green); }
.stat.red .stat-value { color: var(--red); }
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* BUTTONS */
.btn { 
  display: inline-flex; 
  align-items: center; 
  justify-content: center;
  gap: 8px; 
  padding: 10px 20px; 
  border-radius: 8px; 
  border: none; 
  cursor: pointer; 
  font-family: inherit; 
  font-size: 13px; 
  font-weight: 700; 
  transition: all .2s cubic-bezier(0.4, 0, 0.2, 1); 
}
.btn-gold { background: var(--gold); color: #0a0f1d; }
.btn-gold:hover { background: var(--gold2); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(var(--gold-rgb),.35); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--gold); color: var(--gold); background: rgba(var(--gold-rgb), 0.05); }
.btn-danger { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.25); color: var(--red); }
.btn-danger:hover { background: rgba(239,68,68,.25); transform: translateY(-1px); }
.btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 6px; }

/* INPUTS */
input, select, textarea { font-family: inherit; }
.input { 
  width: 100%; 
  background: var(--bg); 
  border: 1px solid var(--border); 
  border-radius: 8px; 
  padding: 10px 14px; 
  color: var(--text); 
  font-family: inherit; 
  font-size: 13px; 
  transition: border .2s ease, box-shadow .2s ease; 
  outline: none; 
}
.input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(var(--gold-rgb), 0.15); }
.input::placeholder { color: var(--muted); }
.input-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }

/* TABLE */
.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); }
table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; }
thead tr { background: var(--bg3); }
th { 
  padding: 14px 12px; 
  color: var(--gold); 
  font-weight: 700; 
  font-size: 12px; 
  border-bottom: 2px solid var(--gold); 
  white-space: nowrap; 
  position: sticky; 
  top: 0; 
  background: var(--bg3); 
}
td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-family: 'Plus Jakarta Sans', 'IBM Plex Sans Arabic', sans-serif; }
tr:last-child td { border-bottom: none; }
tr.alt td { background: rgba(31, 41, 55, 0.15); }
tr.holiday td { background: rgba(249,115,22,.08); }
tr.total-row td { background: var(--bg3); font-weight: 800; border-top: 2px solid var(--gold); color: var(--gold); }
.table-input { 
  width: 100%; 
  background: transparent; 
  border: 1px solid transparent; 
  border-radius: 6px; 
  padding: 6px 10px; 
  color: var(--text); 
  font-family: 'Plus Jakarta Sans', sans-serif; 
  font-size: 13px; 
  text-align: center; 
  outline: none; 
  transition: all .2s; 
}
.table-input:focus { border-color: var(--gold); background: rgba(var(--gold-rgb),.08); }
.badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.badge-green { background: rgba(16,185,129,.15); color: var(--green); }
.badge-red { background: rgba(239,68,68,.15); color: var(--red); }
.badge-orange { background: rgba(249,115,22,.15); color: var(--orange); }

/* CLIENT CARD */
.client-card { 
  background: var(--card-bg); 
  border: 2px solid var(--border); 
  border-radius: var(--radius); 
  padding: 20px; 
  cursor: pointer; 
  box-shadow: var(--shadow);
  transition: all .25s cubic-bezier(0.4, 0, 0.2, 1); 
}
.client-card:hover { border-color: rgba(var(--gold-rgb),.5); transform: translateY(-4px); }
.client-card.selected { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold), var(--shadow); }
.client-avatar { 
  width: 48px; 
  height: 48px; 
  border-radius: 50%; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 20px; 
  font-weight: 800; 
  color: #0a0f1d; 
  margin-bottom: 12px; 
  flex-shrink: 0; 
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

/* MODAL */
.modal-overlay { 
  position: fixed; 
  inset: 0; 
  background: rgba(0,0,0,.65); 
  backdrop-filter: blur(6px); 
  z-index: 2000; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  padding: 20px; 
  opacity: 0; 
  pointer-events: none; 
  transition: opacity .3s ease; 
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { 
  background: var(--card-bg); 
  border: 1px solid var(--border); 
  border-radius: 16px; 
  padding: 30px; 
  width: 100%; 
  max-width: 480px; 
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  transform: scale(.92) translateY(15px); 
  transition: transform .3s cubic-bezier(.175,.885,.32,1.2); 
}
.modal-overlay.open .modal { transform: scale(1) translateY(0); }
.modal-title { font-size: 20px; font-weight: 800; color: var(--gold); margin-bottom: 22px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

/* PROGRESS BAR */
.progress-wrap { background: var(--bg3); border-radius: 8px; height: 8px; overflow: hidden; }
.progress-bar { height: 100%; border-radius: 8px; transition: width .6s cubic-bezier(0.4, 0, 0.2, 1); }

/* SEARCH */
.search-wrap { position: relative; }
.search-wrap .icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }

/* TABS */
.tabs { display: flex; gap: 6px; background: var(--bg3); padding: 5px; border-radius: 10px; margin-bottom: 22px; border: 1px solid var(--border); }
.tab { 
  flex: 1; 
  padding: 10px; 
  text-align: center; 
  border: none; 
  border-radius: 7px; 
  cursor: pointer; 
  font-family: inherit; 
  font-size: 13px; 
  font-weight: 700; 
  transition: all .2s ease; 
  background: transparent; 
  color: var(--muted); 
}
.tab.active { background: var(--card-bg); color: var(--gold); box-shadow: 0 4px 12px rgba(0,0,0,.2); border: 1px solid var(--border); }

/* PRICE CALC helper */
.price-hint { font-size: 11px; color: var(--muted); text-align: left; margin-top: 4px; }

/* ANIMATIONS */
@keyframes fadeIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
.fade-in { animation: fadeIn .4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

/* SECTION HEADER */
.sec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; flex-wrap: wrap; gap: 12px; }
.sec-title { font-size: 20px; font-weight: 800; color: var(--gold); }

/* EMPTY STATE */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-icon { font-size: 54px; margin-bottom: 16px; }

/* CHIP GROUP */
.chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip { 
  padding: 8px 16px; 
  border-radius: 20px; 
  font-size: 13px; 
  font-weight: 600; 
  cursor: pointer; 
  transition: all .2s ease; 
  border: 1px solid var(--border); 
  background: transparent; 
  color: var(--text); 
  font-family: inherit; 
}
.chip.active { background: var(--gold); color: #0a0f1d; border-color: var(--gold); box-shadow: 0 4px 10px rgba(var(--gold-rgb), 0.25); }
.chip:not(.active):hover { border-color: var(--gold); color: var(--gold); background: rgba(var(--gold-rgb), 0.05); }

/* COLOR OPTIONS (Add Client Modal) */
.color-opt {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  transition: transform .15s ease, box-shadow .15s ease;
}
.color-opt:hover {
  transform: scale(1.15);
}

/* CHART DOT HOVER EFFECT */
.chart-dot {
  transition: r 0.2s ease, fill 0.2s ease;
}
.chart-dot:hover {
  r: 6;
  fill: var(--text);
}

/* INVOICE PREVIEW ON SCREEN */
#print-invoice-area {
  display: none;
}
body.printing-invoice #print-invoice-area {
  display: block;
  position: fixed;
  inset: 0;
  background: rgba(10, 15, 29, 0.9);
  backdrop-filter: blur(10px);
  z-index: 9999;
  overflow-y: auto;
  padding: 40px 20px;
}

/* PRINT MEDIA */
@media print {
  header, nav, .no-print, #toast, .modal-overlay, main { display: none !important; }
  body { background: white !important; color: black !important; }
  #print-invoice-area {
    display: block !important;
    position: static !important;
    background: white !important;
    color: black !important;
    padding: 0 !important;
  }
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .stat-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
}
@media (max-width: 700px) {
  nav button span { display: none; }
  .header-inner { padding: 0 12px; height: 60px; }
}
@media (max-width: 520px) {
  .stat-grid { grid-template-columns: 1fr; }
  .sec-header { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<div id="toast" class="no-print"></div>
<div id="chart-tooltip"></div>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🐔</div>
      <div>
        <div class="logo-text">الودرني للدواجن</div>
        <div class="logo-sub">الحامة — قابس</div>
      </div>
    </div>
    <nav id="nav">
      <button class="active" onclick="setView('dashboard')" id="nav-dashboard">🏠 <span>الرئيسية</span></button>
      <button onclick="setView('ledger')" id="nav-ledger">📋 <span>السجل اليومي</span></button>
      <button onclick="setView('clients')" id="nav-clients">👥 <span>العملاء</span></button>
      <button onclick="setView('analytics')" id="nav-analytics">📊 <span>التحليلات</span></button>
      <button onclick="setView('summary')" id="nav-summary">📈 <span>الملخص المالي</span></button>
    </nav>
    <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
      <button class="theme-toggle no-print" onclick="toggleTheme()" title="تغيير المظهر" id="theme-btn">🌙</button>
      <button class="btn btn-outline btn-sm no-print" onclick="printView()" title="طباعة">🖨️</button>
      <select id="month-sel" class="input" style="width:auto;padding:6px 10px;font-size:12px" onchange="onMonthChange()">
        <option value="1">يناير</option><option value="2">فبراير</option><option value="3">مارس</option>
        <option value="4">أبريل</option><option value="5" selected>مايو</option><option value="6">يونيو</option>
        <option value="7">يوليو</option><option value="8">أغسطس</option><option value="9">سبتمبر</option>
        <option value="10">أكتوبر</option><option value="11">نوفمبر</option><option value="12">ديسمبر</option>
      </select>
      <input type="number" id="year-sel" class="input" style="width:72px;padding:6px 8px;font-size:12px;text-align:center" value="2026" min="2020" max="2035" onchange="onMonthChange()"/>
    </div>
  </div>
</header>

<main id="main-content"></main>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box"></div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const MONTHS = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const COLORS = ["#d4a843","#3b82f6","#22c55e","#ef4444","#a855f7","#f97316","#14b8a6","#ec4899"];

let state = {
  clients: [
    { id: 1, name: "محمد بن علي", address: "الحامة 1", phone: "55 549 457", color: 0 },
  ],
  ledger: {},
  selectedClient: 1,
  view: "dashboard",
  pricePerKg: 5.8,
  searchQuery: "",
  theme: "dark"
};

// Load from localStorage
try {
  const saved = localStorage.getItem("dawajin_state");
  if (saved) {
    const parsed = JSON.parse(saved);
    state = { ...state, ...parsed };
  }
} catch(e) {}

function save() {
  try { localStorage.setItem("dawajin_state", JSON.stringify(state)); } catch(e) {}
}

function toast(msg = "✓ تم الحفظ", type = "success") {
  const el = document.getElementById("toast");
  if (!el) return;
  
  let icon = "✓";
  if (type === "error") icon = "❌";
  else if (type === "warning") icon = "⚠️";
  else if (type === "info") icon = "ℹ️";
  
  el.className = `no-print show ${type}`;
  el.innerHTML = `<span style="font-size:16px">${icon}</span> <span>${msg}</span>`;
  
  if (window.toastTimeout) clearTimeout(window.toastTimeout);
  window.toastTimeout = setTimeout(() => {
    el.classList.remove("show");
  }, 2500);
}

function showChartTooltip(e, date, nw, price, amt) {
  const el = document.getElementById("chart-tooltip");
  if (!el) return;
  el.innerHTML = `
    <div style="font-weight:700;color:var(--gold);margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:4px;font-family:'Plus Jakarta Sans', sans-serif">${date}</div>
    <div style="display:flex;justify-content:space-between;gap:20px;margin-bottom:3px">
      <span style="color:var(--muted)">الوزن الصافي:</span>
      <span style="font-weight:700;color:var(--blue);font-family:'Plus Jakarta Sans', sans-serif">${nw} كغ</span>
    </div>
    <div style="display:flex;justify-content:space-between;gap:20px;margin-bottom:3px">
      <span style="color:var(--muted)">السعر الفردي:</span>
      <span style="font-weight:700;color:var(--gold);font-family:'Plus Jakarta Sans', sans-serif">${fmt(price)} د.ت</span>
    </div>
    <div style="display:flex;justify-content:space-between;gap:20px;font-weight:800;margin-top:6px;border-top:1px dashed var(--border);padding-top:6px">
      <span style="color:var(--muted)">المبلغ الجملي:</span>
      <span style="color:var(--green);font-family:'Plus Jakarta Sans', sans-serif">${fmt(amt)} د.ت</span>
    </div>
  `;
  el.style.display = "block";
  const x = e.pageX + 15;
  const y = e.pageY - 15;
  el.style.left = x + "px";

// ─── DATA ─────────────────────────────────────────────────────────────────────
function ledgerKey(cid, y, m) { return `${cid}-${y}-${m}`; }
function getMonth() { return +document.getElementById("month-sel").value; }
function getYear() { return +document.getElementById("year-sel").value; }
function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }

function getRows(cid, y, m) {
  const k = ledgerKey(cid, y, m);
  if (!state.ledger[k]) {
    const days = daysInMonth(y, m);
    state.ledger[k] = Array.from({length: days}, (_, i) => ({
      d: i + 1,
      tw: "", nw: "", price: "", amt: "", paid: "", holiday: false, notes: ""
    }));
  }
  return state.ledger[k];
}

function setRow(cid, y, m, idx, field, val) {
  const rows = getRows(cid, y, m);
  rows[idx][field] = val;
  save();
  updateStatBar(cid, y, m);
  
  // Real-time update of row balance element!
  const balEl = document.getElementById(`bal-${idx}`);
  if (balEl) {
    const row = rows[idx];
    const bal = calcBalance(row);
    balEl.textContent = row.amt ? fmt(bal) : "";
    balEl.style.color = bal > 0 ? "var(--red)" : bal < 0 ? "var(--orange)" : "var(--muted)";
  }
}

// Ensure row balance helper calculates dynamically
function calcBalance(row) {
  return (parseFloat(row.amt) || 0) - (parseFloat(row.paid) || 0);
}

function getTotals(cid, y, m) {
  const rows = getRows(cid, y, m);
  return rows.filter(r => !r.holiday).reduce((a, r) => ({
    tw: a.tw + (parseFloat(r.tw)||0),
    nw: a.nw + (parseFloat(r.nw)||0),
    amt: a.amt + (parseFloat(r.amt)||0),
    paid: a.paid + (parseFloat(r.paid)||0),
    days: a.amt ? a.days + 1 : a.days,
  }), { tw:0, nw:0, amt:0, paid:0, days:0 });
}

function fmt(n) {
  if (!n && n !== 0) return "";
  return Number(n).toLocaleString("fr-TN", { minimumFractionDigits: 3, maximumFractionDigits: 3 });
}

function autoCalcAmt(idx, nw) {
  const val = parseFloat(nw);
  const cid = state.selectedClient, y = getYear(), m = getMonth();
  const rows = getRows(cid, y, m);
  const row = rows[idx];
  
  if (!val) {
    row.amt = "";
    save();
    const el = document.getElementById(`amt-${idx}`);
    if (el) { el.value = ""; }
    updateStatBar(cid, y, m);
    const balEl = document.getElementById(`bal-${idx}`);
    if (balEl) balEl.textContent = "";
    return;
  }
  
  const activePrice = parseFloat(row.price) || state.pricePerKg || 0;
  if (!activePrice) return;
  if (!row.amt) {
    row.amt = parseFloat((val * activePrice).toFixed(3));
    save();
    const el = document.getElementById(`amt-${idx}`);
    if (el) { el.value = row.amt; }
    updateStatBar(cid, y, m);
    const balEl = document.getElementById(`bal-${idx}`);
    if (balEl) balEl.textContent = fmt(calcBalance(row));
  }
}

function autoRecalcRow(idx) {
  const cid = state.selectedClient, y = getYear(), m = getMonth();
  const rows = getRows(cid, y, m);
  const row = rows[idx];
  const nw = parseFloat(row.nw) || 0;
  const activePrice = parseFloat(row.price) || state.pricePerKg || 0;
  
  if (!nw) {
    row.amt = "";
    save();
    const el = document.getElementById(`amt-${idx}`);
    if (el) el.value = "";
    updateStatBar(cid, y, m);
    const balEl = document.getElementById(`bal-${idx}`);
    if (balEl) balEl.textContent = "";
    return;
  }
  
  if (activePrice) {
    row.amt = parseFloat((nw * activePrice).toFixed(3));
    save();
    const el = document.getElementById(`amt-${idx}`);
    if (el) { el.value = row.amt; }
    updateStatBar(cid, y, m);
    const balEl = document.getElementById(`bal-${idx}`);
    if (balEl) balEl.textContent = fmt(calcBalance(row));
  }
}

// ─── DEBT REGULATOR FIFO ───────────────────────────────────────────────────────
function quickSettleDebt(cid, amount) {
  let remainingPayment = parseFloat(amount);
  if (!remainingPayment || remainingPayment <= 0) return;
  const y = getYear(), m = getMonth();
  const rows = getRows(cid, y, m);
  
  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    if (r.holiday || !r.amt) continue;
    const amt = parseFloat(r.amt) || 0;
    const paid = parseFloat(r.paid) || 0;
    const due = amt - paid;
    if (due <= 0) continue;
    
    if (remainingPayment >= due) {
      r.paid = amt;
      remainingPayment -= due;
    } else {
      r.paid = parseFloat((paid + remainingPayment).toFixed(3));
      remainingPayment = 0;
      break;
    }
  }
  
  save();
  render();
  toast("✓ تم تسوية وتوزيع الدفعات بنجاح");
}

function openQuickSettleModal(cid) {
  const cl = state.clients.find(x => x.id === cid);

  document.getElementById("modal-box").innerHTML = `

function submitQuickSettle(cid) {

// ─── EXPORTS (CSV & JSON) ─────────────────────────────────────────────────────
function exportToCSV() {
  const y = getYear(), m = getMonth();
  const cl = state.clients.find(x => x.id === state.selectedClient) || state.clients[0];
  if (!cl) return;
  
  const rows = getRows(cl.id, y, m);
  const totals = getTotals(cl.id, y, m);
  
  let csvContent = "\uFEFF"; // UTF-8 BOM for Excel
  csvContent += "سجل المبيعات اليومي - الودرني للدواجن\n";
  csvContent += `العميل: ${cl.name}, العنوان: ${cl.address}, الهاتف: ${cl.phone}\n`;
  csvContent += `الشهر: ${MONTHS[m-1]} ${y}\n\n`;
  
  csvContent += "التاريخ,الوزن الكامل (كغ),الوزن الصافي (كغ),السعر (د.ت),المبلغ الجملي,المدفوع,الباقي,ملاحظات\n";
  
  rows.forEach(r => {
    const dateStr = `${y}/${String(m).padStart(2,"0")}/${String(r.d).padStart(2,"0")}`;
    if (r.holiday) {
      csvContent += `${dateStr},عطلة,عطلة,عطلة,عطلة,عطلة,عطلة,${r.notes || ""}\n`;
    } else {
      const bal = calcBalance(r);
      csvContent += `${dateStr},${r.tw || 0},${r.nw || 0},${r.price || state.pricePerKg},${r.amt || 0},${r.paid || 0},${r.amt ? bal : 0},${r.notes || ""}\n`;
    }
  });
  
  const remaining = totals.amt - totals.paid;
  csvContent += `الإجمالي,${Math.round(totals.tw)},${Math.round(totals.nw)},-,${totals.amt},${totals.paid},${remaining},-\n`;
  
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement("a");
  const url = URL.createObjectURL(blob);
  link.setAttribute("href", url);
  link.setAttribute("download", `ouderni_ledger_${cl.name.replace(/\s+/g, '_')}_${y}_${m}.csv`);
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  toast("✓ تم تصدير ملف Excel (CSV)");
}

function exportBackupJSON() {
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
  const dlAnchorElem = document.createElement('a');
  dlAnchorElem.setAttribute("href", dataStr);
  dlAnchorElem.setAttribute("download", `dawajin_pro_backup_${Date.now()}.json`);
  dlAnchorElem.click();
  toast("✓ تم تحميل ملف النسخة الاحتياطية");
}

function importBackupJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const importedState = JSON.parse(e.target.result);
      if (importedState.clients && importedState.ledger) {
        state = { ...state, ...importedState };
        save();
        render();
        applyTheme();
        toast("✓ تم استيراد البيانات بنجاح !");
      } else {
        alert("ملف غير صالح.");
      }
    } catch (err) {
      alert("فشل قراءة الملف.");
    }
  };
  reader.readAsText(file);
}

// ─── CHARTS GENERATION ────────────────────────────────────────────────────────
function generateSVGLineChart(cid, y, m) {
  const rows = getRows(cid, y, m);
  const days = daysInMonth(y, m);
  const data = rows.map(r => ({ d: r.d, val: (parseFloat(r.amt) || 0) }));
  const maxVal = Math.max(...data.map(d => d.val), 1000);
  
  const width = 800;
  const height = 240;
  const paddingX = 50;
  const paddingY = 30;
  
  const chartW = width - paddingX * 2;
  const chartH = height - paddingY * 2;
  
  const points = data.map(pt => {
    const x = paddingX + (pt.d - 1) * (chartW / (days - 1));
    const y = height - paddingY - (pt.val * (chartH / maxVal));
    return { x, y, val: pt.val, d: pt.d };
  });
  
  let dPath = "";
  let areaPath = "";
  
  if (points.length > 0) {
    dPath = `M ${points[0].x} ${points[0].y}`;
    areaPath = `M ${points[0].x} ${height - paddingY}`;
    areaPath += ` L ${points[0].x} ${points[0].y}`;
    
    for (let i = 1; i < points.length; i++) {
      dPath += ` L ${points[i].x} ${points[i].y}`;
      areaPath += ` L ${points[i].x} ${points[i].y}`;
    }
    
    areaPath += ` L ${points[points.length - 1].x} ${height - paddingY} Z`;
  }
  
  let gridLines = "";
  let labels = "";
  
  for (let i = 0; i <= 4; i++) {
    const val = (maxVal / 4) * i;
    const y = height - paddingY - (val * (chartH / maxVal));
    gridLines += `<line x1="${paddingX}" y1="${y}" x2="${width - paddingX}" y2="${y}" stroke="var(--border)" stroke-dasharray="4 4" stroke-width="1" />`;
    labels += `<text x="${paddingX - 10}" y="${y + 4}" fill="var(--muted)" font-size="10" text-anchor="end" font-family="'Plus Jakarta Sans', sans-serif">${Math.round(val).toLocaleString()}</text>`;
  }
  
  const keyDays = [1, 5, 10, 15, 20, 25, days];
  keyDays.forEach(kd => {
    const pt = points.find(p => p.d === kd);
    if (pt) {
      gridLines += `<line x1="${pt.x}" y1="${paddingY}" x2="${pt.x}" y2="${height - paddingY}" stroke="var(--border)" stroke-opacity="0.3" stroke-width="1" />`;
      labels += `<text x="${pt.x}" y="${height - paddingY + 16}" fill="var(--muted)" font-size="10" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif">${kd}</text>`;
    }
  });
  
  let circleMarkers = "";
  points.forEach(pt => {
    if (pt.val > 0) {
      const row = rows[pt.d - 1];
      const nw = parseFloat(row.nw) || 0;
      const price = parseFloat(row.price) || state.pricePerKg || 0;
      const dateStr = `${y}/${String(m).padStart(2,'0')}/${String(pt.d).padStart(2,'0')}`;
      circleMarkers += `
        <circle cx="${pt.x}" cy="${pt.y}" r="4" fill="var(--gold)" stroke="var(--bg2)" stroke-width="1.5" class="chart-dot" style="cursor:pointer"
          onmouseover="showChartTooltip(event, '${dateStr}', ${nw}, ${price}, ${pt.val})"
          onmouseout="hideChartTooltip()"
          onmousemove="showChartTooltip(event, '${dateStr}', ${nw}, ${price}, ${pt.val})">
        </circle>`;
    }
  });
  
  return `
    <svg viewBox="0 0 ${width} ${height}" width="100%" height="100%" style="overflow:visible">
      <defs>
        <linearGradient id="chart-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--gold)" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="var(--gold)" stop-opacity="0.0"/>
        </linearGradient>
      </defs>
      ${gridLines}
      <path d="${areaPath}" fill="url(#chart-grad)" />
      <path d="${dPath}" fill="none" stroke="var(--gold)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
      ${circleMarkers}
      ${labels}
    </svg>
  `;
}

function generateSVGDonutChart(clientShares) {
  const total = clientShares.reduce((a, c) => a + c.amount, 0);
  if (total === 0) {
    return `<div style="padding:40px;color:var(--muted);text-align:center">لا توجد مبيعات في هذا الشهر للرسم البياني</div>`;
  }
  
  const R = 50;
  const C = 2 * Math.PI * R;
  
  let currentOffset = 0;
  let circlesHtml = "";
  let legendHtml = "";
  
  clientShares.forEach((share, idx) => {
    const pct = (share.amount / total) * 100;
    const strokeLength = (pct / 100) * C;
    const strokeOffset = C - strokeLength + currentOffset;
    const color = COLORS[share.color % COLORS.length];
    
    circlesHtml += `
      <circle cx="60" cy="60" r="${R}" fill="transparent" 
        stroke="${color}" stroke-width="10" 
        stroke-dasharray="${C}" stroke-dashoffset="${strokeOffset}" 
        transform="rotate(-90 60 60)" style="transition: stroke-dashoffset 0.6s ease" />
    `;
    
    currentOffset -= strokeLength;
    
    legendHtml += `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:12px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:12px;height:12px;border-radius:3px;background:${color}"></div>
          <span style="font-weight:600">${share.name}</span>
        </div>
        <span style="color:var(--muted);font-family:'Plus Jakarta Sans'">${fmt(share.amount)} د.ت (${Math.round(pct)}%)</span>
      </div>
    `;
  });
  
  return `
    <div style="display:grid;grid-template-columns:130px 1fr;gap:20px;align-items:center">
      <div style="position:relative;width:120px;height:120px">
        <svg viewBox="0 0 120 120" width="120" height="120">
          ${circlesHtml}
          <circle cx="60" cy="60" r="${R - 5}" fill="var(--bg2)" />
        </svg>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);text-align:center;pointer-events:none">
          <div style="font-size:9px;color:var(--muted)">المجموع</div>
          <div style="font-size:11px;font-weight:800;color:var(--gold);font-family:'Plus Jakarta Sans'">${fmt(total)}</div>
        </div>
      </div>
      <div style="max-height: 150px; overflow-y: auto; padding-right: 4px;">
        ${legendHtml}
      </div>
    </div>
  `;
}

function closeInvoicePrint() {

  if (printArea) printArea.innerHTML = "";
}

// ─── VIEWS ────────────────────────────────────────────────────────────────────
function setView(v) {
  state.view = v;
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  const nb = document.getElementById("nav-" + v);
  if (nb) nb.classList.add("active");
  render();
}

function onMonthChange() { render(); }

function render() {
  const c = document.getElementById("main-content");
  c.innerHTML = "";
  c.className = "fade-in";
  if (state.view === "dashboard") renderDashboard(c);
  else if (state.view === "ledger") renderLedger(c);
  else if (state.view === "clients") renderClients(c);
  else if (state.view === "analytics") renderAnalytics(c);
  else if (state.view === "summary") renderSummary(c);
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function renderDashboard(c) {
  const y = getYear(), m = getMonth();
  const allTotals = state.clients.map(cl => ({ ...cl, ...getTotals(cl.id, y, m) }));
  const grandAmt = allTotals.reduce((a,x) => a + x.amt, 0);
  const grandPaid = allTotals.reduce((a,x) => a + x.paid, 0);
  const grandRem = grandAmt - grandPaid;
  const grandNw = allTotals.reduce((a,x) => a + x.nw, 0);
  const grandTw = allTotals.reduce((a,x) => a + x.tw, 0);

  const topClients = [...allTotals].sort((a,b) => b.amt - a.amt).slice(0, 5);
  const debtors = allTotals.filter(x => x.amt - x.paid > 0).sort((a,b) => (b.amt-b.paid) - (a.amt-a.paid));

  const collectionRate = grandAmt ? Math.round((grandPaid / grandAmt) * 100) : 0;
  const yieldRatio = grandTw ? Math.round((grandNw / grandTw) * 100) : 0;

  c.innerHTML = `
  <div class="sec-header">
    <div class="sec-title">لوحة القيادة الرئيسية — ${MONTHS[m-1]} ${y}</div>
    <div style="font-size:12px;color:var(--muted)">${state.clients.length} عميل نشط</div>
  </div>

  <div class="stat-grid" style="margin-bottom:20px">
    <div class="stat gold">
      <div class="stat-label">إجمالي المبيعات</div>
      <div class="stat-value">${fmt(grandAmt) || "—"}</div>
      <div class="stat-sub">لجميع العملاء</div>
    </div>
    <div class="stat green">
      <div class="stat-label">إجمالي المدفوع</div>
      <div class="stat-value">${fmt(grandPaid) || "—"}</div>
      <div class="stat-sub">النقد المستلم للشركة</div>
    </div>
    <div class="stat ${grandRem > 0 ? 'red' : 'blue'}">
      <div class="stat-label">إجمالي الديون المعلقة</div>
      <div class="stat-value">${fmt(grandRem) || "—"}</div>
      <div class="stat-sub">${debtors.length} عملاء متبقين</div>
    </div>
    <div class="stat blue">
      <div class="stat-label">إجمالي الوزن الصافي</div>
      <div class="stat-value">${Math.round(grandNw)} كغ</div>
      <div class="stat-sub">الكامل: ${Math.round(grandTw)} كغ</div>
    </div>
    <div class="stat green">
      <div class="stat-label">نسبة تحصيل الديون</div>
      <div class="stat-value">${collectionRate}%</div>
      <div class="stat-sub">كفاءة تحصيل المبيعات</div>
    </div>
    <div class="stat gold">
      <div class="stat-label">نسبة الوزن الصافي المردودية</div>

      <div class="stat-sub">صافي الوزن / كامل الوزن</div>

      ${topClients.length === 0 ? '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">لا توجد بيانات</div>' :
        topClients.map((cl, i) => {
          const pct = grandAmt ? Math.round(cl.amt/grandAmt*100) : 0;
          return `
          <div style="margin-bottom:12px;cursor:pointer" onclick="selectClient(${cl.id})">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
              <div style="display:flex;align-items:center;gap:8px">
                <div style="width:24px;height:24px;border-radius:50%;background:${COLORS[cl.color%COLORS.length]};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#0b1520">${i+1}</div>

            </div>

        <div style="padding:12px 16px;background:var(--bg3);border-radius:8px;font-size:13px;flex:1;min-width:180px">
          <span style="color:var(--muted)">مثال: 100كغ × </span>
          <span style="color:var(--gold);font-weight:700">${fmt(state.pricePerKg)}</span>
          <span style="color:var(--muted)"> = </span>

function updateDefaultPrice(val) {
  const newPrice = parseFloat(val) || 0;
  state.pricePerKg = newPrice;
  save();
  
  // Recalculate amounts in the current ledger for the active client where no custom price is set
  const cid = state.selectedClient, y = getYear(), m = getMonth();
  if (cid) {
    const rows = getRows(cid, y, m);
    rows.forEach(r => {
      if (!r.holiday && !r.price && r.nw) {
        r.amt = parseFloat((parseFloat(r.nw) * newPrice).toFixed(3));
      }
    });
    save();
  }
  
  render(); // Re-render to update placeholders, stats and graphs!
  toast('✓ تم تحديث السعر الافتراضي وتحديث الحسابات');
}

function updateStatBar(cid, y, m) {
  if (cid !== state.selectedClient || y !== getYear() || m !== getMonth()) return;
  const totals = getTotals(cid, y, m);
  const rem = totals.amt - totals.paid;
  const el = document.getElementById("stat-bar");
  if (el) el.innerHTML = `
    <div class="stat blue"><div class="stat-label">الوزن الكامل الجملي</div><div class="stat-value">${Math.round(totals.tw)} كغ</div><div class="stat-sub">${totals.days} يوم</div></div>
    <div class="stat green"><div class="stat-label">إجمالي الوزن الصافي</div><div class="stat-value">${Math.round(totals.nw)} كغ</div></div>
    <div class="stat gold"><div class="stat-label">المبلغ الإجمالي</div><div class="stat-value">${fmt(totals.amt)||"—"}</div></div>
    <div class="stat ${rem>0?'red':'green'}"><div class="stat-label">الباقي بذمته</div><div class="stat-value">${fmt(rem)||"—"}</div></div>`;

  // Real-time update of table footer!
  const totTwEl = document.getElementById("tot-tw");
  const totNwEl = document.getElementById("tot-nw");
  const totAmtEl = document.getElementById("tot-amt");
  const totPaidEl = document.getElementById("tot-paid");
  const totRemEl = document.getElementById("tot-rem");
  
  if (totTwEl) totTwEl.textContent = Math.round(totals.tw);
  if (totNwEl) totNwEl.textContent = Math.round(totals.nw);
  if (totAmtEl) totAmtEl.textContent = fmt(totals.amt) || "—";
  if (totPaidEl) totPaidEl.textContent = fmt(totals.paid) || "—";
  if (totRemEl) {
    totRemEl.textContent = fmt(rem) || "—";
    totRemEl.style.color = rem > 0 ? "var(--red)" : "var(--green)";
  }
}

function toggleHoliday(idx) {
  const cid = state.selectedClient, y = getYear(), m = getMonth();
  const rows = getRows(cid, y, m);
  rows[idx].holiday = !rows[idx].holiday;
  if (rows[idx].holiday) { rows[idx].tw=""; rows[idx].nw=""; rows[idx].price=""; rows[idx].amt=""; rows[idx].paid=""; }
  save(); render();
}

    <span class="icon">🔍</span>
    <input class="input" style="padding-right:36px" placeholder="بحث عن عميل..." value="${state.searchQuery}"
      oninput="state.searchQuery=this.value;renderClients(document.getElementById('main-content'))"/>
  </div>
  <div class="card-grid">
    ${filtered.map(cl => {
      const y = getYear(), m = getMonth();
      const t = getTotals(cl.id, y, m);
      const rem = t.amt - t.paid;
      
      let badgeHtml = "";
      if (t.amt > 0) {
        if (rem <= 0) {
          badgeHtml += `<span class="badge badge-green" style="font-size:9px;padding:2px 8px;margin-right:4px">مخلص 💸</span>`;
        } else {
          badgeHtml += `<span class="badge badge-red" style="font-size:9px;padding:2px 8px;margin-right:4px">مدين ⚠️</span>`;
        }
        
        // VIP check (highest volume)
        const allAmts = state.clients.map(x => getTotals(x.id, y, m).amt);
        const maxAmt = Math.max(...allAmts, 1);
        if (t.amt >= maxAmt * 0.7 && t.amt > 100) {
          badgeHtml += `<span class="badge" style="font-size:9px;padding:2px 8px;background:rgba(212,168,67,0.12);color:var(--gold);border:1px solid rgba(212,168,67,0.25);margin-right:4px">كبير الحرفاء ⭐</span>`;
        }
      }

      return `
      <div class="client-card ${cl.id===state.selectedClient?'selected':''}" onclick="selectClient(${cl.id})">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div style="width:44px;height:44px;border-radius:50%;background:${COLORS[cl.color%COLORS.length]};display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#0b1520">${cl.name[0]}</div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openEditClient(${cl.id})">✏️</button>
            ${state.clients.length > 1 ? `<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();confirmDelete(${cl.id})">🗑️</button>` : ''}
          </div>
        </div>
        <div style="font-size:15px;font-weight:800;color:${COLORS[cl.color%COLORS.length]};margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">
          <span>${cl.name}</span>
          <div style="display:flex;gap:4px">${badgeHtml}</div>
        </div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:2px">📍 ${cl.address}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:12px">📞 ${cl.phone}</div>
        <div style="display:flex;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border)">
          <div style="text-align:center">
            <div style="font-size:13px;font-weight:700;color:var(--gold)">${fmt(t.amt)||"—"}</div>
            <div style="font-size:10px;color:var(--muted)">الجملي</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:13px;font-weight:700;color:var(--green)">${fmt(t.paid)||"—"}</div>
            <div style="font-size:10px;color:var(--muted)">المدفوع</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:13px;font-weight:700;color:${rem>0?'var(--red)':'var(--green)'}">${rem>0?fmt(rem):'✓'}</div>
            <div style="font-size:10px;color:var(--muted)">الباقي</div>
          </div>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

function openAddClient() {
  document.getElementById("modal-box").innerHTML = `
    <div class="modal-title">إضافة عميل جديد</div>
    <div style="display:grid;gap:12px">
      <div><div class="input-label">الاسم *</div><input class="input" id="m-name" placeholder="محمد بن علي"/></div>
      <div><div class="input-label">العنوان</div><input class="input" id="m-addr" placeholder="الحامة 1"/></div>
      <div><div class="input-label">الهاتف</div><input class="input" id="m-phone" placeholder="55 xxx xxx"/></div>
      <div>
        <div class="input-label">رمز اللون المميز للعميل</div>
        <div style="display:flex;gap:8px;margin-top:4px">
          ${COLORS.map((col,i) => `<div class="color-opt" style="background:${col};width:32px;height:32px;border-radius:50%;cursor:pointer;outline:${i===0?'2px solid var(--gold)':'none'}" onclick="document.querySelectorAll('.color-opt').forEach(x=>x.style.outline='none');this.style.outline='2px solid var(--gold)';document.getElementById('m-color').value=${i}"></div>`).join("")}
        </div>
        <input type="hidden" id="m-color" value="0"/>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-gold" style="flex:1" onclick="submitAddClient()">إضافة العميل</button>
        <button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
      </div>
    </div>`;
  document.getElementById("modal-overlay").classList.add("open");
}

function submitAddClient() {
  const name = document.getElementById("m-name").value.trim();
  const addr = document.getElementById("m-addr").value.trim();
  const phone = document.getElementById("m-phone").value.trim();
  const color = parseInt(document.getElementById("m-color").value) || 0;
  
  if (!name) { alert("الرجاء إدخال اسم العميل"); return; }
  
  const newClient = {
    id: Date.now(),
    name: name,
    address: addr || "—",
    phone: phone || "—",
    color: color
  };
  
  state.clients.push(newClient);
  save();
  render();
  closeModal();
  toast("✓ تم إضافة العميل الجديد بنجاح");
}

function openEditClient(id) {
  const cl = state.clients.find(x => x.id === id);
  if (!cl) return;
  document.getElementById("modal-box").innerHTML = `
    <div class="modal-title">تعديل بيانات العميل</div>
    <div style="display:grid;gap:12px">
      <div><div class="input-label">الاسم *</div><input class="input" id="m-name" value="${cl.name}"/></div>
      <div><div class="input-label">العنوان</div><input class="input" id="m-addr" value="${cl.address}"/></div>
      <div><div class="input-label">الهاتف</div><input class="input" id="m-phone" value="${cl.phone}"/></div>
      <div>
        <div class="input-label">رمز اللون المميز للعميل</div>
        <div style="display:flex;gap:8px;margin-top:4px">
          ${COLORS.map((col,i) => `<div class="color-opt" style="background:${col};width:32px;height:32px;border-radius:50%;cursor:pointer;outline:${i===cl.color?'2px solid var(--gold)':'none'}" onclick="document.querySelectorAll('.color-opt').forEach(x=>x.style.outline='none');this.style.outline='2px solid var(--gold)';document.getElementById('m-color').value=${i}"></div>`).join("")}
        </div>
        <input type="hidden" id="m-color" value="${cl.color}"/>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-gold" style="flex:1" onclick="submitEditClient(${cl.id})">حفظ التعديلات</button>
        <button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
      </div>
    </div>`;
  document.getElementById("modal-overlay").classList.add("open");
}

function submitEditClient(id) {
  const name = document.getElementById("m-name").value.trim();
  const addr = document.getElementById("m-addr").value.trim();
  const phone = document.getElementById("m-phone").value.trim();
  const color = parseInt(document.getElementById("m-color").value) || 0;
  
  if (!name) { alert("الرجاء إدخال اسم العميل"); return; }
  
  const cl = state.clients.find(x => x.id === id);
  if (cl) {
    cl.name = name;
    cl.address = addr || "—";
    cl.phone = phone || "—";
    cl.color = color;
    save();
    render();
    closeModal();
    toast("✓ تم تعديل بيانات العميل بنجاح");
  }
}

function confirmDelete(id) {
  const cl = state.clients.find(x => x.id === id);
  if (!cl) return;
  document.getElementById("modal-box").innerHTML = `
    <div class="modal-title" style="color:var(--red)">تأكيد حذف العميل</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px">هل أنت متأكد من حذف العميل <strong>${cl.name}</strong>؟<br>سوف يتم حذف جميع بيانات وسجلات هذا العميل بشكل نهائي!</p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-danger" style="flex:1" onclick="deleteClient(${cl.id})">نعم، حذف العميل</button>
      <button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
    </div>`;
  document.getElementById("modal-overlay").classList.add("open");
}

function deleteClient(id) {
  state.clients = state.clients.filter(x => x.id !== id);
  if (state.selectedClient === id) {
    state.selectedClient = state.clients.length ? state.clients[0].id : null;
  }
  save();
  render();
  closeModal();
  toast("✓ تم حذف العميل بنجاح");
}

// ─── ANALYTICS ─────────────────────────────────────────────────────────────────
function renderAnalytics(c) {
  const y = getYear(), m = getMonth();
  const allTotals = state.clients.map(cl => ({ ...cl, ...getTotals(cl.id, y, m) }));
  const shares = allTotals.filter(x => x.amt > 0).map(x => ({
    name: x.name,
    amount: x.amt,
    color: x.color
  }));
  
  let maxDayVol = 0;
  let maxDayDate = "";
  let totalActiveDays = 0;
  let priceCount = 0;
  let priceSum = 0;
  
  state.clients.forEach(cl => {
    const rows = getRows(cl.id, y, m);
    rows.forEach(r => {
      if (r.holiday) return;
      const nw = parseFloat(r.nw) || 0;
      if (nw > 0) totalActiveDays++;
      if (nw > maxDayVol) {
        maxDayVol = nw;
        maxDayDate = `${y}/${String(m).padStart(2,'0')}/${String(r.d).padStart(2,'0')}`;
      }
      const price = parseFloat(r.price) || state.pricePerKg;
      if (price) {
        priceSum += price;
        priceCount++;
      }
    });
  });
  
  const avgPrice = priceCount ? parseFloat((priceSum / priceCount).toFixed(3)) : state.pricePerKg;
  const activeClient = state.clients.find(x => x.id === state.selectedClient) || state.clients[0];
  
  const grandAmt = allTotals.reduce((a,x) => a + x.amt, 0);
  const grandNw = allTotals.reduce((a,x) => a + x.nw, 0);

  const avgDailySales = totalActiveDays ? parseFloat((grandAmt / totalActiveDays).toFixed(3)) : 0;
  const avgDailyWeight = totalActiveDays ? Math.round(grandNw / totalActiveDays) : 0;

  let bestBuyerName = "—";
  let bestBuyerWt = 0;
  allTotals.forEach(cl => {
    if (cl.nw > bestBuyerWt) {
      bestBuyerWt = cl.nw;
      bestBuyerName = cl.name;
    }
  });

  let bestPayName = "—";
  let bestPayPct = 0;
  allTotals.forEach(cl => {
    if (cl.amt > 0) {
      const pct = Math.round((cl.paid / cl.amt) * 100);
      if (pct > bestPayPct) {
        bestPayPct = pct;
        bestPayName = cl.name;
      }
    }
  });

  const prevM = m === 1 ? 12 : m - 1;
  const prevY = m === 1 ? y - 1 : y;
  let prevGrandAmt = 0;
  state.clients.forEach(cl => {
    const totals = getTotals(cl.id, prevY, prevM);
    prevGrandAmt += totals.amt;
  });

  let growthHtml = "";
  if (prevGrandAmt > 0) {
    const pctChange = ((grandAmt - prevGrandAmt) / prevGrandAmt) * 100;
    const isUp = pctChange >= 0;
    growthHtml = `
      <div style="background:var(--bg3);padding:12px;border-radius:8px;text-align:center">
        <div style="font-size:11px;color:var(--muted)">نمو مبيعات الشركة MoM</div>
        <div style="font-size:16px;font-weight:800;color:${isUp ? 'var(--green)' : 'var(--red)'};font-family:'Plus Jakarta Sans';margin-top:4px">
          ${isUp ? '▲ +' : '▼ -'}${Math.abs(Math.round(pctChange))}%
        </div>
      </div>`;
  } else {
    growthHtml = `
      <div style="background:var(--bg3);padding:12px;border-radius:8px;text-align:center">
        <div style="font-size:11px;color:var(--muted)">نمو مبيعات الشركة MoM</div>
        <div style="font-size:11px;color:var(--muted);margin-top:8px">لا يوجد سجلات للشهر السابق</div>
      </div>`;
  }

  c.innerHTML = `
    <div class="sec-header">
      <div class="sec-title">التحليلات والمؤشرات البيانية — ${MONTHS[m-1]} ${y}</div>
    </div>
    
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;flex-wrap:wrap">
      <div class="card" style="grid-column: span 2">
        <div style="font-size:14px;font-weight:700;color:var(--gold);margin-bottom:14px">📈 حركة مبيعات العميل النشط (${activeClient ? activeClient.name : '—'})</div>
        <div style="height:260px;width:100%">
          ${activeClient ? generateSVGLineChart(activeClient.id, y, m) : '<div style="color:var(--muted);text-align:center;padding:40px">حدد عميلاً لعرض المخطط</div>'}
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:6px;text-align:center">المحور الأفقي: أيام الشهر | المحور العمودي: المبيعات الإجمالية بالدينار (د.ت)</div>
      </div>
      
      <div class="card">
        <div style="font-size:14px;font-weight:700;color:var(--gold);margin-bottom:14px">🍩 توزيع مبيعات العملاء السوقية</div>
        <div>
          ${generateSVGDonutChart(shares)}
        </div>
      </div>
      
      <div class="card" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;align-content:start">
        <div style="grid-column: span 2;font-size:14px;font-weight:700;color:var(--gold);margin-bottom:4px">📊 إحصائيات الأداء البياني للشركة</div>
        
        <div style="background:var(--bg3);padding:12px;border-radius:8px;text-align:center">
          <div style="font-size:11px;color:var(--muted)">معدل سعر الكيلوغرام الفعلي</div>
          <div style="font-size:16px;font-weight:800;color:var(--gold);font-family:'Plus Jakarta Sans';margin-top:4px">${fmt(avgPrice)} د.ت</div>
        </div>
        
        <div style="background:var(--bg3);padding:12px;border-radius:8px;text-align:center">
          <div style="font-size:11px;color:var(--muted)">أيام تسليم الدواجن النشطة</div>
          <div style="font-size:16px;font-weight:800;color:var(--blue);font-family:'Plus Jakarta Sans';margin-top:4px">${totalActiveDays} يوم تسليم</div>
        </div>
        
        <div style="background:var(--bg3);padding:12px;border-radius:8px;text-align:center">
          <div style="font-size:11px;color:var(--muted)">معدل الإيرادات اليومية</div>
          <div style="font-size:16px;font-weight:800;color:var(--gold);font-family:'Plus Jakarta Sans';margin-top:4px">${fmt(avgDailySales)} د.t</div>
        </div>
        
        <div style="background:var(--bg3);padding:12px;border-radius:8px;text-align:center">
          <div style="font-size:11px;color:var(--muted)">معدل شحنات التوزيع اليومي</div>
          <div style="font-size:16px;font-weight:800;color:var(--blue);font-family:'Plus Jakarta Sans';margin-top:4px">${Math.round(avgDailyWeight)} كغ</div>
        </div>
        
        <div style="background:var(--bg3);padding:12px;border-radius:8px;text-align:center;grid-column:span 2">
          <div style="font-size:11px;color:var(--muted)">أعلى حجم تسليم للشركة في يوم واحد</div>
          <div style="font-size:16px;font-weight:800;color:var(--green);font-family:'Plus Jakarta Sans';margin-top:4px">
            ${Math.round(maxDayVol)} كغ 
            <span style="font-size:11px;color:var(--muted);font-weight:400">بتاريخ (${maxDayDate || '—'})</span>
          </div>
        </div>
        
        <div style="background:var(--bg3);padding:12px;border-radius:8px;text-align:center">
          <div style="font-size:11px;color:var(--muted)">بطل الشراء للشهر 🏆</div>
          <div style="font-size:13px;font-weight:800;color:var(--gold);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${bestBuyerName}">
            ${bestBuyerName} 
            <span style="font-size:10px;color:var(--muted);font-weight:400">(${Math.round(bestBuyerWt)} كغ)</span>
          </div>
        </div>
        
        <div style="background:var(--bg3);padding:12px;border-radius:8px;text-align:center">
          <div style="font-size:11px;color:var(--muted)">أفضل التزام بالتسديد 💸</div>
          <div style="font-size:13px;font-weight:800;color:var(--green);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${bestPayName}">
            ${bestPayName} 
            <span style="font-size:10px;color:var(--muted);font-weight:400">(${bestPayPct}%)</span>
          </div>
        </div>
        
        <div style="grid-column: span 2">
          ${growthHtml}
        </div>
      </div>
    </div>
  `;
}

// ─── SUMMARY ─────────────────────────────────────────────────────────────────
function renderSummary(c) {
  const y = getYear(), m = getMonth();
  const rows = state.clients.map(cl => ({ ...cl, ...getTotals(cl.id, y, m) }));
  const grand = rows.reduce((a,x) => ({ amt:a.amt+x.amt, paid:a.paid+x.paid, nw:a.nw+x.nw, tw:a.tw+x.tw }), {amt:0,paid:0,nw:0,tw:0});

  c.innerHTML = `
  <div class="sec-header">
    <div class="sec-title">الملخص المالي الشامل — ${MONTHS[m-1]} ${y}</div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>العميل</th><th>الوزن الكامل</th><th>الوزن الصافي</th>
        <th>المبلغ الجملي</th><th>المدفوع</th><th>الباقي</th><th>الحالة</th>
      </tr></thead>
      <tbody>
        ${rows.map((r,i) => {
          const rem = r.amt - r.paid;
          return `<tr class="${i%2?'alt':''}" style="cursor:pointer" onclick="selectClient(${r.id})">
            <td>
              <div style="display:flex;align-items:center;gap:8px">
                <div style="width:30px;height:30px;border-radius:50%;background:${COLORS[r.color%COLORS.length]};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#0b1520">${r.name[0]}</div>
                <div style="text-align:right">
                  <div style="font-weight:700;font-size:13px">${r.name}</div>
                  <div style="font-size:11px;color:var(--muted)">${r.address}</div>
                </div>
              </div>
            </td>
            <td>${r.tw ? Math.round(r.tw)+' كغ' : '—'}</td>
            <td>${r.nw ? Math.round(r.nw)+' كغ' : '—'}</td>
            <td style="font-weight:600;color:var(--gold)">${fmt(r.amt)||'—'}</td>
            <td style="color:var(--green)">${fmt(r.paid)||'—'}</td>
            <td style="font-weight:700;color:${rem>0?'var(--red)':rem<0?'var(--orange)':'var(--muted)'}">${rem>0?fmt(rem):rem<0?'زيادة':'—'}</td>
            <td>
              <span class="badge ${rem<=0?'badge-green':rem>0?'badge-red':'badge-orange'}">
                ${rem<=0?'✓ مسوّى':'⚠ متبقي بذمته'}
              </span>
            </td>
          </tr>`;
        }).join("")}
      </tbody>
      <tfoot>
        <tr class="total-row">
          <td style="color:var(--gold)">الإجمالي</td>
          <td>${Math.round(grand.tw)} كغ</td>
          <td>${Math.round(grand.nw)} كغ</td>
          <td style="color:var(--gold)">${fmt(grand.amt)||'—'}</td>
          <td style="color:var(--green)">${fmt(grand.paid)||'—'}</td>
          <td style="color:${grand.amt-grand.paid > 0 ? 'var(--red)' : 'var(--green)'}">${fmt(grand.amt-grand.paid)||'—'}</td>
          <td></td>
        </tr>
      </tfoot>
    </table>
  </div>`;
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function closeModal(e) {
  if (e && e.target !== document.getElementById("modal-overlay") && e.target !== document.getElementById("modal-box")) {
    if (!e.target.closest("#modal-box")) {
      document.getElementById("modal-overlay").classList.remove("open");
    }
  } else if (!e) {
    document.getElementById("modal-overlay").classList.remove("open");
  }
}

// ─── PRINT ────────────────────────────────────────────────────────────────────
function printView() { window.print(); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
applyTheme();
render();
</script>
</body>
</html>
